<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>StudyStreak</title>
        <link rel="stylesheet" href="popup.css">
    </head>
    <body>
        <main>
            <h1>Study &gt;_ Streak</h1>

            <label class="row">
                <input id="reminders-enabled" type="checkbox">
                Daily reminder
            </label>

            <label>
                Reminder time
                <input id="reminder-time" type="time">
            </label>

            <button id="save-button">Save</button>
            <button id="test-button">Test notification</button>

            <p id="status"></p>
        </main>

        <script src="popup.js"></script>
    </body>
</html>
