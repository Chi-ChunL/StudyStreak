<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>StudyStreak</title>
        <link rel="stylesheet" href="popup.css">
    </head>
    <body>
        <main>
            <h1>Study &gt;_ Streak</h1>

            <div class="popup-shell">
                <nav class="side-tabs">
                    <button class="side-tab-button active" data-tab="account">Account</button>
                    <button class="side-tab-button" data-tab="reminder" disabled>Reminder</button>
                    <button class="side-tab-button" data-tab="focus" disabled>Focus</button>
                    <button class="side-tab-button" data-tab="export" disabled>Export</button>
                </nav>

                <div class="tab-content">
                    <section class="tab-panel active" data-panel="account">
                        <h2>Account</h2>
                        <p id="account-status">Not logged in.</p>

                        <label>
                            Username
                            <input id="login-username" type="text" autocomplete="username">
                        </label>

                        <label>
                            Password
                            <input id="login-password" type="password" autocomplete="current-password">
                        </label>

                        <button id="login-button">Login</button>
                        <button id="logout-button">Logout</button>
                    </section>

                    <section class="tab-panel" data-panel="reminder" hidden>
                        <h2>Reminder</h2>

                        <label class="row">
                            <input id="reminders-enabled" type="checkbox">
                            Timetable notification
                        </label>

                        <div class="field-block">
                            <span class="field-label">Today</span>
                            <div id="today-sessions" class="today-sessions">
                                No sessions today.
                            </div>
                        </div>

                        <button id="test-button">Test notification</button>
                    </section>

                    <section class="tab-panel" data-panel="focus" hidden>
                        <h2>Focus quality</h2>
                        <label>
                            Subject
                            <select id="focus-subject">
                                <option value="">No synced subjects</option>
                            </select>
                        </label>
                        <button id="refresh-subjects-button">Refresh Subjects</button>
                        <label>
                            Focus websites
                            <textarea id="allowed-domains" rows="4"></textarea>
                        </label>
                        <label class="row">
                            <input id="strict-focus-enabled" type="checkbox">
                            Strict Focus
                        </label>
                        <label class="row">
                            <input id="pomodoro-enabled" type="checkbox">
                            Pomodoro 50/10
                        </label>
                        <button id="save-button">Save Focus Websites</button>

                        <button id="start-focus-button">Start Focus</button>
                        <button id="stop-focus-button">Stop Focus</button>

                        <p id="focus-state"></p>
                        <p id="pomodoro-state"></p>
                        <p id="focus-score"></p>
                        <p id="focus-time"></p>
                        <p id="focus-domain"></p>
                    </section>

                    <section class="tab-panel" data-panel="export" hidden>
                        <h2>Export</h2>

                        <p id="last-focus-summary"></p>
                        <button id="copy-summary-button" disabled>Copy Summary</button>

                        <label>
                            Import Key
                            <input id="import-key" type="password">
                        </label>

                        <button id="copy-json-button" disabled>Copy JSON</button>

                        <h3>Recent focus sessions</h3>
                        <div id="focus-history"></div>
                        <button id="clear-history-button">Clear History</button>
                    </section>
                </div>
            </div>

            <p id="status" role="status" aria-live="polite"></p>
        </main>

        <script src="popup.js"></script>
    </body>
</html>
